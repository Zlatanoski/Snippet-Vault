services:
  postgres:
    image: postgres:16-alpine
    container_name: snippet-vault-db
    restart: unless-stopped
    environment:

        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: snippet_vault
    ports:
    - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: